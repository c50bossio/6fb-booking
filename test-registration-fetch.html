<!DOCTYPE html>
<html>
<head>
    <title>Registration Test</title>
</head>
<body>
    <h1>Registration Debug Test</h1>
    <button onclick="testRegistration()">Test Registration</button>
    <div id="results"></div>

    <script>
        async function testRegistration() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testing registration...</p>';
            
            try {
                console.log('Making registration request...');
                
                const response = await fetch('http://localhost:8000/api/v1/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'frontend-test@example.com',
                        password: 'TestPass123',
                        name: 'Frontend Test User',
                        create_test_data: false
                    })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Response data:', data);
                
                resultsDiv.innerHTML = `
                    <p><strong>SUCCESS!</strong></p>
                    <p>Status: ${response.status}</p>
                    <p>Response: ${JSON.stringify(data, null, 2)}</p>
                `;
                
            } catch (error) {
                console.error('Registration failed:', error);
                resultsDiv.innerHTML = `
                    <p><strong>ERROR:</strong></p>
                    <p>${error.message}</p>
                    <p>Check console for more details</p>
                `;
            }
        }
        
        // Also test if the API is reachable
        async function testConnection() {
            try {
                const response = await fetch('http://localhost:8000/api/v1/auth/test');
                console.log('Connection test:', response.status, await response.text());
            } catch (error) {
                console.error('Connection test failed:', error);
            }
        }
        
        // Test connection on load
        testConnection();
    </script>
</body>
</html>
